<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JeenaFlix Player</title><script src="https://www.youtube.com/iframe_api"></script><style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial,sans-serif}.player-container{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden;transition:transform 0.3s ease}.player-container.rotate{transform:rotate(90deg);width:100vh;height:100vw;transform-origin:top left;position:absolute;top:0;left:0}.player-container.locked *{pointer-events:none!important}.player-container.locked .lock-overlay{display:flex!important;pointer-events:auto!important}.lock-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:9999999;color:#fff}.dl-modal{display:none;position:absolute;inset:0;z-index:9999999;background:rgba(0,0,0,0.8);justify-content:center;align-items:center}.dl-content{background:#181818;padding:25px;border-radius:15px;text-align:center;color:white;border:1px solid #e50914;width:80%;max-width:300px}.dl-content button{background:#e50914;border:none;color:white;padding:10px 20px;margin:10px 5px;cursor:pointer;border-radius:5px;font-weight:bold}.video-wrap{position:absolute;top:-4%;left:-2%;width:104%;height:108%;z-index:1;pointer-events:none;transition:all .5s ease}.video-wrap.zoomed{top:-21%;left:-9%;width:118%;height:142%}#player{width:100%;height:100%}#player iframe{pointer-events:none!important}.brand{position:absolute;top:15px;left:15px;z-index:99999;background:transparent;color:#fff;font-weight:900;font-size:22px;pointer-events:none}.bottom-panel{position:absolute;left:0;bottom:0;width:100%;background:linear-gradient(to top,rgba(0,0,0,.9) 0,transparent 100%);padding:10px 15px;box-sizing:border-box;z-index:99999;opacity:0;pointer-events:none;transition:.25s;display:flex;flex-direction:column;gap:12px}.show-controls .bottom-panel{opacity:1;pointer-events:auto}.seekbar{width:100%;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.3);border-radius:2px;cursor:pointer;accent-color:#e50914}.controls-row{display:flex;justify-content:space-between;align-items:center;width:100%}.left-controls,.right-controls{display:flex;align-items:center;gap:15px}.ctrl-btn{background:0 0;border:none;cursor:pointer;padding:0;display:flex;justify-content:center;align-items:center}.ctrl-btn svg{width:26px;height:26px;fill:#fff}.red-dot{color:#e50914;font-size:24px;font-weight:bold;line-height:24px}.time-display{color:#fff;font-size:12px}.start-sound{position:absolute;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);color:#fff;font-weight:900;font-size:20px}.start-sound.show{display:flex}
</style></head><body oncontextmenu="return false">

<div id="container" class="player-container">
    <div class="lock-overlay" onclick="JFP.unlock()">🔒 Locked - Click to Unlock</div>
    <div id="dlModal" class="dl-modal">
        <div class="dl-content">
            <p>Download Quality</p>
            <button onclick="JFP.goDl()">Download Now</button>
            <button onclick="JFP.closeDl()">Cancel</button>
        </div>
    </div>
    <div class="video-wrap" id="videoWrap"><div id="player"></div></div>
    <div class="brand">JeenaFlix</div>
    <div id="soundStart" class="start-sound">Click to Play</div>

    <div class="bottom-panel">
        <div class="seekbar-container"><input type="range" id="seekbar" class="seekbar" min="0" max="100" value="0"></div>
        <div class="controls-row">
            <div class="left-controls">
                <button class="ctrl-btn" onclick="JFP.p()"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
                <div class="time-display" id="time">00:00 / 00:00</div>
            </div>
            <div class="right-controls">
                <button class="ctrl-btn red-dot" onclick="JFP.dl()">●</button>
                <button class="ctrl-btn" onclick="JFP.rot()"><svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
                <button class="ctrl-btn" onclick="JFP.lock()"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg></button>
            </div>
        </div>
    </div>
</div>

<script>
(()=>{let P,C=$("container"),B=$("seekbar"),DL=$("dlModal"),SS=$("soundStart"),$=i=>document.getElementById(i);
window.onYouTubeIframeAPIReady=()=>{P=new YT.Player("player",{videoId:new URLSearchParams(location.search).get("v")||"7BrhwM_XCbg",playerVars:{autoplay:1,controls:0,playsinline:1},events:{onReady:e=>{SS.style.display="flex";setInterval(()=>{B.value=P.getCurrentTime()/P.getDuration()*100},500)}}})};
window.JFP={
    p:()=>{P.getPlayerState()===1?P.pauseVideo():P.playVideo()},
    rot:()=>{C.classList.toggle("rotate")},
    lock:()=>{C.classList.add("locked")},
    unlock:()=>{C.classList.remove("locked")},
    dl:()=>{DL.style.display="flex"},
    closeDl:()=>{DL.style.display="none"},
    goDl:()=>{window.open("https://snapsave.app/en-US?url=https://www.youtube.com/watch?v="+P.getVideoData().video_id,"_blank");DL.style.display="none"}
};
C.onclick=()=>{if(!C.classList.contains("locked")){C.classList.toggle("show-controls");if(SS.style.display!=="none"){P.playVideo();P.seekTo(10);SS.style.display="none"}}}
})();
</script>
</body></html>
