<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JeenaFlix Player</title>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
body{margin:0;background:#000;overflow:hidden;font-family:Arial,sans-serif}
.player-container{position:relative;width:100vw;height:100vh;background:#000;overflow:hidden}
/* ویڈیو زومنگ کنٹرول */
.video-wrap{position:absolute;top:-4%;left:-2%;width:104%;height:108%;z-index:1;pointer-events:none;transition:all 0.4s ease}
.video-wrap.zoomed{top:-30%;left:-15%;width:130%;height:160%} 
#player{width:100%;height:100%}
#player iframe{pointer-events:none!important}

.brand{position:absolute;top:15px;left:15px;z-index:999999;color:#fff;font-weight:900;font-size:22px;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,.9)}
.center-brand-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:999999;color:#fff;}
.main-text{font-size:35px;font-weight:900;font-family:monospace;white-space:nowrap;overflow:hidden;border-right:4px solid #e50914;width:0;animation:typing 3s steps(30) forwards,blink .7s infinite;text-shadow:0 0 20px #e50914;margin:0 auto;}
.sub-text{font-size:13px;color:#e50914;margin-top:12px;opacity:0;animation:fadeIn 1s 3s forwards;letter-spacing:1.5px;text-transform:uppercase;font-weight:bold;}
@keyframes typing{from{width:0}to{width:360px}}@keyframes blink{50%{border-color:transparent}}@keyframes fadeIn{to{opacity:1}}

.bottom-panel{position:absolute;left:0;bottom:0;width:100%;background:linear-gradient(to top,rgba(0,0,0,.9) 0,transparent 100%);padding:10px 15px;box-sizing:border-box;z-index:99999;opacity:0;pointer-events:none;transition:.25s;display:flex;flex-direction:column;gap:12px}
.show-controls .bottom-panel{opacity:1;pointer-events:auto}
.seekbar{width:100%;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.3);border-radius:2px;outline:none;cursor:pointer;accent-color:#e50914}
.controls-row{display:flex;justify-content:space-between;align-items:center;width:100%}
.left-controls,.right-controls{display:flex;align-items:center;gap:18px}
.ctrl-btn{background:0 0;border:none;cursor:pointer;padding:0;display:flex;justify-content:center;align-items:center}
.ctrl-btn svg{width:26px;height:26px;fill:#fff;transition:.2s}
.ctrl-btn:hover svg{fill:#e50914}
.time-display{color:#fff;font-size:14px;user-select:none;margin-left:2px;font-weight:500}
.tap-msg{position:absolute;top:50%;transform:translateY(-50%);z-index:999999;color:#fff;background:rgba(0,0,0,.6);padding:12px 18px;border-radius:30px;font-weight:bold;opacity:0;transition:.25s;pointer-events:none}
.tap-msg.left{left:35px}.tap-msg.right{right:35px}.tap-msg.show{opacity:1}
.start-sound{position:absolute;inset:0;z-index:999999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.25);color:#fff;font-weight:900;font-size:20px;text-align:center}
.start-sound.show{display:flex}
.end-cover{position:absolute;inset:0;background:#000;display:none;justify-content:center;align-items:center;flex-direction:column;z-index:999999;color:#fff}
.end-cover.show{display:flex}
.replay-btn{background:#e50914;color:#fff;border:none;padding:12px 22px;border-radius:10px;font-size:17px;cursor:pointer}
.dl-box{position:absolute;bottom:70px;right:20px;background:#111;padding:15px;border-radius:8px;border:1px solid #e50914;display:none;z-index:999999}
.dl-box a{color:#fff;text-decoration:none;display:block;padding:5px 0}
</style></head>
<body oncontextmenu="return false">

<div id="container" class="player-container">
<div class="video-wrap zoomed" id="videoWrap"><div id="player"></div></div>

<div class="brand">JeenaFlix</div>
<div id="centerBrand" class="center-brand-wrap">
    <div class="main-text">www.JeenaFlix.com</div>
    <div class="sub-text">Download JeenaFlix App for the best experience!</div>
</div>

<div id="dlBox" class="dl-box"><a href="#" id="dlLink" target="_blank">📥 Download Video</a></div>
<div id="soundStart" class="start-sound">Tap to Play with Sound</div>
<div id="backMsg" class="tap-msg left">-10s</div>
<div id="forwardMsg" class="tap-msg right">+10s</div>

<div class="bottom-panel">
    <div class="seekbar-container"><input type="range" id="seekbar" class="seekbar" min="0" max="100" value="0" step="0.1"></div>
    <div class="controls-row">
        <div class="left-controls">
            <button class="ctrl-btn" onclick="JFP.p(event)"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
            <button class="ctrl-btn" onclick="JFP.r(event)"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8zm-1.1 11h-.85v-3.26l-1.01.31v-.69l1.77-.63h.09V16zm4.28-1.76c0 .32-.03.6-.1.82-.07.23-.17.42-.29.57-.12.16-.27.27-.44.35-.17.08-.36.12-.57.12-.22 0-.41-.04-.58-.12-.17-.08-.32-.19-.44-.35-.12-.15-.22-.34-.29-.57-.07-.22-.1-.5-.1-.82v-1.48c0-.32.03-.6.1-.82.07-.22.17-.41.29-.57.12-.15.27-.26.44-.34.17-.08.36-.12.58-.12.21 0 .4.04.57.12.17.08.32.19.44.34.12.16.22.35.29.57.07.22.1.5.1.82v1.48zm-.85-1.57c0-.24-.02-.43-.06-.58-.04-.15-.1-.26-.17-.33-.08-.08-.17-.11-.29-.11-.11 0-.21.03-.28.11-.08.07-.13.18-.17.33-.04.15-.06.34-.06.58v1.65c0 .24.02.43.06.58.04.15.1.26.17.33.07.08.17.12.28.12.12 0 .21-.04.29-.12.07-.07.13-.18.17-.33.04-.15.06-.34.06-.58v-1.65z"/></svg></button>
            <div class="time-display"><span id="currentTime">00:00</span> / <span id="duration">00:00</span></div>
        </div>
        <div class="right-controls">
            <button class="ctrl-btn" onclick="JFP.dl(event)"><svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zM19 9h-4V3H9v6H5l7 7 7-7z"/></svg></button>
            <button class="ctrl-btn" onclick="JFP.fs(event)"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
        </div>
    </div>
</div>

<div id="endCover" class="end-cover"><h2>Video Ended</h2><button class="replay-btn" onclick="JFP.re(event)">Replay</button></div>
</div>

<script>
(()=>{let P,T,H,L=0,F=!0,$=i=>document.getElementById(i),C=$("container"),B=$("seekbar"),VW=$("videoWrap"),CB=$("centerBrand"),BM=$("backMsg"),FM=$("forwardMsg"),PI=$("playIcon"),PA=$("pauseIcon"),EC=$("endCover"),DLB=$("dlBox"),DLL=$("dlLink");
function VID(){return new URLSearchParams(location.search).get("v")||"7BrhwM_XCbg"}
function SH(){C.classList.add("show-controls");VW.classList.add("zoomed");clearTimeout(H);H=setTimeout(()=>{C.classList.remove("show-controls");VW.classList.remove("zoomed")},4000)}
function MSG(el){el.classList.add("show");setTimeout(()=>el.classList.remove("show"),600)}
window.onYouTubeIframeAPIReady=()=>{P=new YT.Player("player",{videoId:VID(),playerVars:{autoplay:1,controls:0,disablekb:1,iv_load_policy:3,playsinline:1,fs:0,modestbranding:1},events:{onReady:()=>{P.playVideo();setTimeout(()=>{VW.classList.remove("zoomed");F=!1},4000)},onStateChange:e=>{if(e.data===YT.PlayerState.PLAYING){PI.style.display="none";PA.style.display="block"}else{PI.style.display="block";PA.style.display="none";if(e.data===YT.PlayerState.ENDED)EC.classList.add("show")}}}})}
C.addEventListener("click",e=>{if(e.target.closest(".bottom-panel")||e.target.closest(".end-cover")||e.target.closest(".dl-box"))return;let n=Date.now(),D=n-L<300;L=n;SH();if(D){e.clientX>innerWidth/2?(P.seekTo(P.getCurrentTime()+10,!0),MSG(FM)):(P.seekTo(P.getCurrentTime()-10,!0),MSG(BM))}});
window.JFP={p:()=>{P.getPlayerState()===YT.PlayerState.PLAYING?P.pauseVideo():P.playVideo();SH()},r:()=>{P.seekTo(P.getCurrentTime()-10,!0);MSG(BM);SH()},f:()=>{P.seekTo(P.getCurrentTime()+10,!0);MSG(FM);SH()},re:()=>{EC.classList.remove("show");P.seekTo(0,!0);P.playVideo();SH()},fs:()=>{C.requestFullscreen?C.requestFullscreen():C.webkitRequestFullscreen()},dl:()=>{DLL.href="https://snapsave.app/en-US?url=https://www.youtube.com/watch?v="+VID();DLB.style.display=DLB.style.display==="block"?"none":"block"}}
})();
</script></body></html>
